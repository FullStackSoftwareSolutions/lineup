name: lineup

services:
  db:
    # Pinned: matches db/lineup.sql dump (pg 16.2). Postgres 18+ changed the
    # data dir layout and won't init against the existing mount point.
    image: postgres:16
    restart: always
    user: postgres
    volumes:
      - dbdata:/var/lib/postgresql/data
    environment:
      # Mapped from the canonical DB_* vars in repo-root /.env
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
    ports:
      # Host 5433 → container 5432 (avoids collision with other local pg instances).
      # Keep host port in sync with DB_PORT in /.env.
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lineup

networks:
  lineup:

volumes:
  dbdata:
