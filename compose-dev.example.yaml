name: lineup

services:
  next:
    build:
      context: ./next
      additional_contexts:
        root: ./
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_TRPC_URL: http://whatsapp:3333
      WHATSAPP_TRPC_PORT: 3333
      # DB_* interpolated from repo-root /.env. DB_HOST hardcoded to the
      # compose service name since localhost is not reachable across containers.
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
    networks:
      - lineup
    depends_on:
      db:
        condition: service_healthy

  whatsapp:
    build:
      context: ./whatsapp
      additional_contexts:
        root: ./
    restart: always
    volumes:
      - C:\Users\joshm\Development\lineup\state:/usr/src/app/whatsapp/state
    environment:
      WHATSAPP_TRPC_URL: http://whatsapp:3333
      WHATSAPP_TRPC_PORT: 3333
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      OPENAI_ORG_ID: REPLACE_WITH_OPENAI_ORG_ID
      OPENAI_API_KEY: REPLACE_WITH_OPENAI_API_KEY
      TZ: America/Toronto
    expose:
      - 3333
    networks:
      - lineup
    depends_on:
      migration:
        condition: service_completed_successfully

  db:
    image: postgres
    restart: always
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
    expose:
      - 5432
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lineup

  migration:
    build:
      context: ./db
      additional_contexts:
        root: ./
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
    networks:
      - lineup
    depends_on:
      db:
        condition: service_healthy

networks:
  lineup:

volumes:
  db-data:
